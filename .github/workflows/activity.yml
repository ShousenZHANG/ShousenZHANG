name: Generate Contribution Snake

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/activity.yml
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate classic contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ShousenZHANG
          outputs: |
            dist/github-snake.gif?color_snake=24292f&color_dots=%23ebedf0,%239be9a8,%2340c463,%2330a14e,%23216e39&color_background=%23ffffff
            dist/github-snake-dark.gif?palette=github-dark&color_snake=ffffff&color_dots=%230d1117,%230e4429,%23006d32,%2326a641,%2339d353&color_background=%230d1117

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
