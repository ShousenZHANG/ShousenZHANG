name: Generate Activity Skyline

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/activity.yml
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution skyline
        uses: yoshi389111/github-profile-3d-contrib@0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ShousenZHANG

      - name: Publish selected skyline asset
        shell: bash
        run: |
          mkdir -p dist
          cp profile-3d-contrib/profile-night-rainbow.svg dist/github-activity-3d.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
