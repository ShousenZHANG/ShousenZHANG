name: Generate Activity Visuals

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/activity.yml
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution skyline
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ShousenZHANG

      - name: Publish selected skyline asset
        shell: bash
        run: |
          mkdir -p dist
          cp profile-3d-contrib/profile-night-rainbow.svg dist/github-activity-3d.svg

      - name: Generate neon contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ShousenZHANG
          outputs: |
            dist/github-snake.svg?color_snake=24292f&color_dots=#ebedf0,#b6e3ff,#80ccff,#54aeff,#0969da
            dist/github-snake-dark.svg?palette=github-dark&color_snake=ff2d95&color_dots=#0d1117,#172033,#2dd4bf,#22d3ee,#a78bfa

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
