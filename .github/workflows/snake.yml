name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ShousenZHANG
          outputs: |
            dist/github-snake.svg?color_snake=24292f&color_dots=#ebedf0,#d0d7de,#8c959f,#57606a,#24292f
            dist/github-snake-dark.svg?palette=github-dark&color_snake=ffffff&color_dots=#0d1117,#21262d,#30363d,#7d8590,#e6edf3

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
