name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ShousenZHANG
          outputs: |
            dist/github-snake.svg?color_snake=d97757&color_dots=#f5e6d3,#f0c8a8,#e89870,#d97757,#a64e30
            dist/github-snake-dark.svg?palette=github-dark&color_snake=d97757&color_dots=#0a0a0a,#3d2817,#d97757,#e89870,#f5b89f

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
